baseURL: https://Treeevor.github.io/
languageCode: en-us
title: TreevNFred

module:
  imports:
    - path: github.com/imfing/hextra

taxonomies:
  tag: tags
  category: categories

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

params:
  siteName: "TreevNFred"
  siteTagline: "Adventures with Fred and more"
  author:
    name: "Trevor"
    email: "sheridad33@gmail.com"
  search:
    enable: true
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /logo.svg
      dark: /logo.svg
      width: 40
      height: 40
      link: /

menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search
    - name: Posts
      url: /Posts/
      weight: 2
    - name: Hiking
      url: /Posts/Hiking/
      weight: 3
    - name: Map
      url: /map/
      weight: 4
    - name: About
      url: /About/
      weight: 5
    - name: Tags
      url: /tags/
      weight: 6
    - name: RSS
      url: /index.xml
      weight: 7
      params:
        icon: rss


outputs:
  home:
    - HTML
    - RSS
    - JSON