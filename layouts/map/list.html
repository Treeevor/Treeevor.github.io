{{ define "main" }}
<div style="width:100%; height:80vh;" id="map"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const hikes = [
  {{ range where .Site.RegularPages "Params.coordinates" "!=" nil }}
  {
    title: {{ .Title | jsonify }},
    url: "{{ .RelPermalink }}",
    lat: {{ index .Params.coordinates 0 }},
    lng: {{ index .Params.coordinates 1 }},
    location: {{ or .Params.location "" | jsonify }},
    miles: {{ or .Params.trail_miles 0 }},
    elevation: {{ or .Params.elevation_gain 0 }},
    difficulty: {{ or .Params.difficulty 0 }},
    beauty: {{ or .Params.beauty 0 }},
    solitude: {{ or .Params.solitude 0 }}
  },
  {{ end }}
];

const map = L.map('map').setView([40.7, -111.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

function getMarkerColor(difficulty) {
  if (difficulty <= 4) return '#22c55e';
  if (difficulty <= 7) return '#f97316';
  return '#ef4444';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: ${color};
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

hikes.forEach(hike => {
  if (!hike.lat || !hike.lng) return;
  const color = getMarkerColor(hike.difficulty);
  const icon = makeIcon(color);
  L.marker([hike.lat, hike.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <strong>${hike.title}</strong><br>
      📍 ${hike.location}<br>
      🥾 ${hike.miles} miles · ${hike.elevation}ft gain<br>
      ⭐ Beauty: ${hike.beauty} · 🔇 Solitude: ${hike.solitude}<br>
      <a href="${hike.url}" target="_blank">Read trip report →</a>
    `);
});
</script>

<div style="margin-top: 12px; display: flex; gap: 16px; font-size: 0.85rem;">
  <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#22c55e;margin-right:4px;"></span>Easy (1–4)</span>
  <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#f97316;margin-right:4px;"></span>Moderate (5–7)</span>
  <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ef4444;margin-right:4px;"></span>Hard (8–10)</span>
</div>
{{ end }}
