<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a1a2e" />
  
  <!-- Mountain -->
  <polygon points="50,18 72,55 28,55" fill="#4ade80" opacity="0.9"/>
  <polygon points="65,30 80,55 50,55" fill="#22c55e" opacity="0.7"/>
  <!-- Snow cap -->
  <polygon points="50,18 57,32 43,32" fill="white" opacity="0.9"/>

  <!-- T letter - left -->
  <text x="24" y="82" font-family="Georgia, serif" font-size="26" font-weight="700" fill="white" opacity="0.95">T</text>

  <!-- Ampersand separator dot -->
  <circle cx="50" cy="75" r="2.5" fill="#4ade80"/>

  <!-- F letter - right -->
  <text x="57" y="82" font-family="Georgia, serif" font-size="26" font-weight="700" fill="white" opacity="0.95">F</text>
</svg>
