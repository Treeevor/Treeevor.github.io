<div style="width:100%; height:80vh;" id="map"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const hikes = [
  
  {
    title: "\"Frary Peak\"",
    url: "http:\/\/localhost:1313\/posts\/hiking\/frary-peak\/",
    lat:  40.962 ,
    lng:  -112.215 ,
    location: "\"Antelope Island\"",
    miles:  7 ,
    elevation:  2100 ,
    difficulty:  4 ,
    beauty:  3 ,
    solitude:  1 
  },
  
  {
    title: "\"Grassy Range High Point\"",
    url: "http:\/\/localhost:1313\/posts\/hiking\/grassy-hp\/",
    lat:  40.93885 ,
    lng:  -113.047782 ,
    location: "\"Tooele\"",
    miles:  7.78 ,
    elevation:  2979 ,
    difficulty:  6.6 ,
    beauty:  5.8 ,
    solitude:  8 
  },
  
  {
    title: "\"\"",
    url: "http:\/\/localhost:1313\/templates\/blank-hike-post\/",
    lat:  null ,
    lng:  null ,
    location: "\"\"",
    miles:  0 ,
    elevation:  0 ,
    difficulty:  0 ,
    beauty:  0 ,
    solitude:  0 
  },
  
];

const map = L.map('map').setView([40.7, -111.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

function getMarkerColor(difficulty) {
  if (difficulty <= 4) return '#22c55e';
  if (difficulty <= 7) return '#f97316';
  return '#ef4444';
}

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: ${color};
      border: 2px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
    popupAnchor: [0, -10]
  });
}

hikes.forEach(hike => {
  if (!hike.lat || !hike.lng) return;
  const color = getMarkerColor(hike.difficulty);
  const icon = makeIcon(color);
  L.marker([hike.lat, hike.lng], { icon })
    .addTo(map)
    .bindPopup(`
      <strong>${hike.title}</strong><br>
      📍 ${hike.location}<br>
      🥾 ${hike.miles} miles · ${hike.elevation}ft gain<br>
      ⭐ Beauty: ${hike.beauty} · 🔇 Solitude: ${hike.solitude}<br>
      <a href="${hike.url}" target="_blank">Read trip report →</a>
    `);
});
</script>
